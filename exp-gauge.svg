<svg width="495" height="175" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #2E3440; }
    .track { fill: #3B4252; rx: 4; }
    .label { font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 13px; fill: #ECEFF4; }
    .pct { font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 12px; fill: #81A1C1; }
    .title { font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 11px; fill: #88C0D0; letter-spacing: 3px; }
    .border { fill: none; stroke: #434C5E; stroke-width: 1; }
  </style>

  <rect width="495" height="175" rx="10" class="bg"/>
  <rect width="495" height="175" rx="10" class="border"/>

  <text x="20" y="28" class="title">&gt;&gt; EXP GAUGE</text>
  <line x1="20" y1="36" x2="475" y2="36" stroke="#434C5E" stroke-width="1"/>

  <!-- Python 85% -->
  <text x="20" y="62" class="label">Python</text>
  <rect x="130" y="50" width="320" height="8" rx="4" fill="#3B4252"/>
  <rect x="130" y="50" width="272" height="8" rx="4" fill="#EBCB8B"/>
  <text x="460" y="62" class="pct" text-anchor="end">85%</text>

  <!-- C# 70% -->
  <text x="20" y="96" class="label">C#</text>
  <rect x="130" y="84" width="320" height="8" rx="4" fill="#3B4252"/>
  <rect x="130" y="84" width="224" height="8" rx="4" fill="#88C0D0"/>
  <text x="460" y="96" class="pct" text-anchor="end">70%</text>

  <!-- C++ 65% -->
  <text x="20" y="130" class="label">C++</text>
  <rect x="130" y="118" width="320" height="8" rx="4" fill="#3B4252"/>
  <rect x="130" y="118" width="208" height="8" rx="4" fill="#D08770"/>
  <text x="460" y="130" class="pct" text-anchor="end">65%</text>

  <!-- ActionScript 60% -->
  <text x="20" y="164" class="label">ActionScript</text>
  <rect x="130" y="152" width="320" height="8" rx="4" fill="#3B4252"/>
  <rect x="130" y="152" width="192" height="8" rx="4" fill="#BF616A"/>
  <text x="460" y="164" class="pct" text-anchor="end">60%</text>
</svg>
